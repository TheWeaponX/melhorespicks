name: Atualizar Preços Amazon

on:
  schedule:
    # Executa todo dia às 8h (horário de Brasília = 11h UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:
    # Permite executar manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4  # ✅ Versão atualizada
      
      - name: 🔧 Configurar Node.js
        uses: actions/setup-node@v4  # ✅ Versão atualizada
        with:
          node-version: '20'  # ✅ Versão LTS atual
      
      - name: 🚀 Executar atualização
        run: node atualizar-precos.js
      
      - name: ✅ Confirmar execução
        run: |
          echo "🎉 Preços atualizados com sucesso!"
          echo "📅 $(date '+%d/%m/%Y %H:%M')"

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page-title">Codex | Livro</title>
<meta name="description" id="meta-description" content="Compare preços e encontre a melhor oferta para este livro."/>

<!-- FAVICON -->
<link rel="icon" type="image/png" sizes="64x64" href="https://codexbylogos.vercel.app/assets/images/favicon.png">
<link rel="apple-touch-icon" href="https://codexbylogos.vercel.app/assets/images/favicon.png">
<link rel="shortcut icon" href="https://codexbylogos.vercel.app/assets/images/favicon.png">

<!-- META TAGS -->
<meta property="og:image" id="og-image" content="https://codexbylogos.vercel.app/assets/images/logo-codex-horizontal.png">
<meta property="og:image:width" content="400">
<meta property="og:image:height" content="100">
<meta name="twitter:image" id="twitter-image" content="https://codexbylogos.vercel.app/assets/images/logo-codex-horizontal.png">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0b0f;--surface:#131318;--card:#18181f;--card-hover:#1e1e28;
  --primary:#8B5CF6;--primary-glow:rgba(139,92,246,0.12);--primary-border:rgba(139,92,246,0.28);
  --gold:#f0a93a;--gold-glow:rgba(240,169,58,0.12);--gold-border:rgba(240,169,58,0.28);
  --text:#f2ede4;--muted:#7a7a8a;--subtle:#3a3a4a;--danger:#e05555;
  --amz:#FF9900;--amz-bg:rgba(255,153,0,0.1);--amz-border:rgba(255,153,0,0.3);
  --shp:#EE4D2D;--shp-bg:rgba(238,77,45,0.1);--shp-border:rgba(238,77,45,0.3);
  --meli:#FFE600;--meli-bg:rgba(255,230,0,0.08);--meli-border:rgba(255,230,0,0.3);
  --best:#22c55e;--best-bg:rgba(34,197,94,0.1);--best-border:rgba(34,197,94,0.3);
  --radius:14px;--radius-sm:9px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
img{display:block}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(11,11,15,0.75);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06)}
.nav-inner{max-width:1180px;margin:0 auto;padding:0 1.5rem;height:68px;display:flex;align-items:center;gap:1.5rem}
.logo{display:flex;align-items:center;gap:11px;flex-shrink:0;text-decoration:none}
.logo-text{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:800;letter-spacing:-0.5px;color:var(--text);line-height:1}
.logo-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:400}

/* BOOK PAGE CONTAINER */
.book-page-container{max-width:1180px;margin:0 auto;padding:2rem 1.5rem 4rem;animation:fadeinup .3s ease both}
.book-page-inner{display:flex;flex-direction:column;gap:2.5rem}

/* BREADCRUMB */
.breadcrumb{font-size:13px;color:var(--muted);padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,0.06)}
.breadcrumb a{color:var(--muted);text-decoration:none;transition:color .15s}
.breadcrumb a:hover{color:var(--primary)}
.breadcrumb span{color:var(--text)}

/* BOOK MAIN */
.book-main{display:grid;grid-template-columns:300px 1fr;gap:2.5rem}
@media(max-width:768px){.book-main{grid-template-columns:1fr}}

/* BOOK COVER */
.book-cover{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,0.07);aspect-ratio:3/4}
.book-cover img{width:100%;height:100%;object-fit:cover}
.book-cover-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;opacity:.1}

/* BOOK INFO */
.book-info{display:flex;flex-direction:column;gap:1rem}
.book-category{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--primary)}
.book-title{font-family:'Playfair Display',Georgia,serif;font-size:2.2rem;font-weight:800;line-height:1.2;color:var(--text)}
.book-author{font-size:1rem;color:var(--gold);font-weight:500}
.book-description{font-size:.95rem;color:var(--muted);line-height:1.7}

/* BOOK PRICES */
.book-prices h2{font-family:'Playfair Display',Georgia,serif;font-size:1.2rem;font-weight:700;margin-bottom:1rem;color:var(--text)}
.book-price-table{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}

/* PRICE ROW */
.price-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid transparent;text-decoration:none;transition:all .15s}
.price-row:hover{transform:translateX(2px)}
.price-row.amz{background:var(--amz-bg);border-color:var(--amz-border)}
.price-row.shp{background:var(--shp-bg);border-color:var(--shp-border)}
.price-row.meli{background:var(--meli-bg);border-color:var(--meli-border)}
.price-row.best-price{box-shadow:0 0 0 1.5px var(--best)}
.store-logo{flex-shrink:0;font-size:11px;font-weight:700;min-width:76px}
.store-logo.amz{color:var(--amz)}
.store-logo.shp{color:var(--shp)}
.store-logo.meli{color:#c9b800}
.price-val{flex:1;font-size:15px;font-weight:700;color:var(--text)}
.best-tag{background:var(--best-bg);border:1px solid var(--best-border);color:var(--best);font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;flex-shrink:0}
.price-arrow{flex-shrink:0;opacity:.4;font-size:14px}
.no-price{font-size:12px;color:var(--muted);font-style:italic;padding:6px 12px}

/* BEST PRICE BUTTON */
.book-best-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px 28px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;text-decoration:none;transition:all .18s;width:fit-content}
.book-best-btn:hover{background:#7C3AED;transform:translateY(-2px)}

/* BOOK HISTORY */
.book-history h2{font-family:'Playfair Display',Georgia,serif;font-size:1.2rem;font-weight:700;margin-bottom:1rem;color:var(--text)}
.history-chart{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);padding:1.5rem}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:150px;margin-top:1rem}
.chart-bar{flex:1;background:var(--primary);border-radius:4px 4px 0 0;min-height:4px;transition:height .3s;position:relative}
.chart-bar:hover{background:var(--gold)}
.chart-bar span{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);white-space:nowrap}

/* RELATED BOOKS */
.related-books h2{font-family:'Playfair Display',Georgia,serif;font-size:1.2rem;font-weight:700;margin-bottom:1rem;color:var(--text)}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.related-card{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;transition:all .2s}
.related-card:hover{border-color:var(--primary-border);transform:translateY(-2px)}
.related-img{aspect-ratio:3/4;background:var(--surface);display:flex;align-items:center;justify-content:center}
.related-img img{width:100%;height:100%;object-fit:cover}
.related-info{padding:.8rem}
.related-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.related-price{font-size:14px;font-weight:700;color:var(--primary);margin-top:4px}

/* LOADING */
.loading-container{display:flex;justify-content:center;align-items:center;min-height:300px}
.spinner{width:40px;height:40px;border:3px solid rgba(139,92,246,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.error-container{text-align:center;padding:4rem}
.error-title{font-family:'Playfair Display',Georgia,serif;font-size:1.5rem;margin-bottom:1rem}
.error-link{color:var(--primary);text-decoration:underline}

/* FOOTER */
footer{border-top:1px solid rgba(255,255,255,0.06);padding:2.5rem 1.5rem;text-align:center;margin-top:2rem}
.footer-inner{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:10px;align-items:center}
.footer-logo{font-family:'Playfair Display',Georgia,serif;font-size:17px;font-weight:800}
.footer-logo em{color:var(--primary);font-style:normal}
.footer-disc{font-size:12px;color:var(--muted);max-width:580px;line-height:1.6;font-weight:300}

@keyframes fadeinup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<script>
const JSONBIN_KEY = "$2a$10$N.ce/SYQr6ExcinOFXZXdeMqNE.bS/nlERJdY7tYEErCkP7kfcHhK";
const JSONBIN_BIN_ID = "69d7fa5b856a6821891781fd";
</script>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a class="logo" href="/" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
      <img src="/assets/images/logo-codex-horizontal.png" alt="Codex by Logos" style="height:40px;width:auto;display:block;" loading="eager">
      <div>
        <div class="logo-text">Codex</div>
        <div class="logo-sub">by Logos</div>
      </div>
    </a>
  </div>
</nav>

<!-- CONTEÚDO DA PÁGINA -->
<div id="book-content">
  <div class="loading-container">
    <div class="spinner"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-logo">Codex<em>byLogos</em></div>
    <p class="footer-disc">Como Associado Amazon e parceiro das demais lojas, posso ganhar comissões em compras qualificadas. © <span id="ano"></span> Codex by Logos.</p>
  </div>
</footer>

<script>
let items = [];
let currentBook = null;

/* ===== CARREGAR DADOS ===== */
async function loadData() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    items = Array.isArray(data.record) ? data.record : [];
    return true;
  } catch (e) {
    console.error('Erro ao carregar:', e);
    return false;
  }
}

/* ===== UTILS ===== */
function parsePrice(str) {
  if (!str) return null;
  const n = parseFloat(str.replace(/[^\d,\.]/g, '').replace(',', '.'));
  return isNaN(n) ? null : n;
}

function bestStore(item) {
  const stores = [
    { key: 'amz', price: parsePrice(item.amzPrice), link: item.amzLink },
    { key: 'shp', price: parsePrice(item.shpPrice), link: item.shpLink },
    { key: 'meli', price: parsePrice(item.meliPrice), link: item.meliLink }
  ].filter(s => s.price !== null && s.link);
  if (!stores.length) return null;
  return stores.reduce((a, b) => a.price <= b.price ? a : b).key;
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function ph(s) {
  return `<svg class="book-cover-placeholder" width="${s}" height="${s}" viewBox="0 0 52 52" fill="none"><rect x="6" y="10" width="40" height="32" rx="5" stroke="white" stroke-width="2"/><circle cx="19" cy="24" r="5" stroke="white" stroke-width="2"/><path d="M6 38l12-10 10 8 8-6 16 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

/* ===== RENDERIZAR PÁGINA ===== */
function renderBookPage(book) {
  document.title = `${book.name} | Codex`;
  document.getElementById('page-title').textContent = `${book.name} | Codex`;
  
  const metaDesc = document.getElementById('meta-description');
  metaDesc.setAttribute('content', `Compare preços de ${book.name}. Encontre a melhor oferta entre Amazon, Shopee e Mercado Livre.`);
  
  if (book.img) {
    document.getElementById('og-image').setAttribute('content', book.img);
    document.getElementById('twitter-image').setAttribute('content', book.img);
  }
  
  const best = bestStore(book);
  const bestLink = best === 'amz' ? book.amzLink : best === 'shp' ? book.shpLink : book.meliLink;
  
  // Tabela de preços
  const stores = [
    { key: 'amz', label: 'Amazon', price: book.amzPrice, link: book.amzLink },
    { key: 'shp', label: 'Shopee', price: book.shpPrice, link: book.shpLink },
    { key: 'meli', label: 'Mercado Livre', price: book.meliPrice, link: book.meliLink }
  ];
  
  let priceRowsHtml = '';
  for (const s of stores) {
    if (!s.link && !s.price) continue;
    const isBest = s.key === best;
    if (s.link) {
      priceRowsHtml += `<a class="price-row ${s.key}${isBest ? ' best-price' : ''}" href="${esc(s.link)}" target="_blank" rel="nofollow sponsored">
        <span class="store-logo ${s.key}">${s.label}</span>
        <span class="price-val">${s.price ? esc(s.price) : 'Ver preço'}</span>
        ${isBest ? '<span class="best-tag">Menor preço</span>' : ''}
        <span class="price-arrow">→</span>
      </a>`;
    } else if (s.price) {
      priceRowsHtml += `<div class="price-row ${s.key}" style="opacity:.55;cursor:default">
        <span class="store-logo ${s.key}">${s.label}</span>
        <span class="price-val">${esc(s.price)}</span>
      </div>`;
    }
  }
  
  // Histórico simulado
  const basePrice = parsePrice(book.amzPrice) || 50;
  const mockHistory = [];
  for (let i = 30; i >= 0; i--) {
    const variation = 0.8 + (Math.random() * 0.4);
    mockHistory.push({
      date: new Date(Date.now() - i * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
      price: Math.round(basePrice * variation * 100) / 100
    });
  }
  
  const prices = mockHistory.map(h => h.price);
  const maxPrice = Math.max(...prices);
  const minPrice = Math.min(...prices);
  
  let chartHtml = '';
  mockHistory.forEach(h => {
    const height = ((h.price - minPrice) / (maxPrice - minPrice)) * 100 || 50;
    const isLowest = h.price === minPrice;
    chartHtml += `<div class="chart-bar" style="height:${height}%;background:${isLowest ? 'var(--gold)' : 'var(--primary)'};" title="${h.date}: R$ ${h.price.toFixed(2)}">
      <span>${h.date.split('-')[2]}/${h.date.split('-')[1]}</span>
    </div>`;
  });
  
  // Livros relacionados
  const related = items.filter(i => i.id !== book.id && i.cat === book.cat).slice(0, 4);
  let relatedHtml = '';
  if (related.length === 0) {
    relatedHtml = '<p style="color:var(--muted);grid-column:1/-1;">Nenhum livro relacionado</p>';
  } else {
    related.forEach(r => {
      const rBest = bestStore(r);
      const rBestPrice = rBest === 'amz' ? r.amzPrice : rBest === 'shp' ? r.shpPrice : r.meliPrice;
      const slug = r.name.toLowerCase().replace(/[^\w\s]/g, '').replace(/\s+/g, '-');
      relatedHtml += `<a href="/livro?id=${r.id}&slug=${slug}" class="related-card">
        <div class="related-img">${r.img ? `<img src="${esc(r.img)}" alt="${esc(r.name)}" loading="lazy">` : ph(40)}</div>
        <div class="related-info">
          <div class="related-name">${esc(r.name)}</div>
          <div class="related-price">${rBestPrice || 'Ver preço'}</div>
        </div>
      </a>`;
    });
  }
  
  const html = `
    <div class="book-page-container">
      <div class="book-page-inner">
        <nav class="breadcrumb">
          <a href="/">Início</a> / 
          <a href="/?categoria=${encodeURIComponent(book.cat || '')}">${book.cat || 'Livros'}</a> / 
          <span>${esc(book.name)}</span>
        </nav>
        
        <div class="book-main">
          <div class="book-cover">
            ${book.img ? `<img src="${esc(book.img)}" alt="${esc(book.name)}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : ''}
            ${!book.img ? ph(80) : '<div class="book-cover-placeholder" style="display:none;">' + ph(80) + '</div>'}
          </div>
          
          <div class="book-info">
            <span class="book-category">${esc(book.cat || '')}</span>
            <h1 class="book-title">${esc(book.name)}</h1>
            ${book.author ? `<p class="book-author">${esc(book.author)}</p>` : ''}
            <p class="book-description">${esc(book.desc || 'Nenhuma descrição disponível.')}</p>
            
            <div class="book-prices">
              <h2>Compare Preços</h2>
              <div class="book-price-table">${priceRowsHtml || '<div class="no-price">Nenhum link cadastrado</div>'}</div>
            </div>
            
            ${bestLink ? `<a href="${esc(bestLink)}" class="book-best-btn" target="_blank" rel="nofollow sponsored">Ver melhor preço →</a>` : ''}
          </div>
        </div>
        
        <div class="book-history">
          <h2>Histórico de Preços (30 dias)</h2>
          <div class="history-chart">
            <p style="color:var(--muted);">Variação de preço na Amazon</p>
            <div class="chart-bars">${chartHtml}</div>
          </div>
        </div>
        
        <div class="related-books">
          <h2>Livros Relacionados</h2>
          <div class="related-grid">${relatedHtml}</div>
        </div>
      </div>
    </div>
  `;
  
  document.getElementById('book-content').innerHTML = html;
}

function showError() {
  document.getElementById('book-content').innerHTML = `
    <div class="error-container">
      <h1 class="error-title">Livro não encontrado</h1>
      <p style="color:var(--muted);margin-bottom:2rem;">O livro que você está procurando não existe ou foi removido.</p>
      <a href="/" class="book-best-btn">← Voltar para o início</a>
    </div>
  `;
}

/* ===== INICIALIZAR ===== */
async function init() {
  document.getElementById('ano').textContent = new Date().getFullYear();
  
  const params = new URLSearchParams(window.location.search);
  const bookId = params.get('id');
  
  if (!bookId) {
    showError();
    return;
  }
  
  const success = await loadData();
  if (!success) {
    showError();
    return;
  }
  
  const book = items.find(i => i.id === bookId);
  if (!book) {
    showError();
    return;
  }
  
  currentBook = book;
  renderBookPage(book);
}

init();
</script>
</body>
</html>

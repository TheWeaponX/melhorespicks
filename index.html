<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MelhoresPicks – Compare e economize</title>
<meta name="description" content="Compare preços da Amazon, Shopee e Mercado Livre e encontre a melhor oferta."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0b0f;--surface:#131318;--card:#18181f;--card-hover:#1e1e28;
  --gold:#f0a93a;--gold-glow:rgba(240,169,58,0.12);--gold-border:rgba(240,169,58,0.28);
  --text:#f2ede4;--muted:#7a7a8a;--subtle:#3a3a4a;--danger:#e05555;
  --amz:#FF9900;--amz-bg:rgba(255,153,0,0.1);--amz-border:rgba(255,153,0,0.3);
  --shp:#EE4D2D;--shp-bg:rgba(238,77,45,0.1);--shp-border:rgba(238,77,45,0.3);
  --meli:#FFE600;--meli-bg:rgba(255,230,0,0.08);--meli-border:rgba(255,230,0,0.3);
  --best:#22c55e;--best-bg:rgba(34,197,94,0.1);--best-border:rgba(34,197,94,0.3);
  --radius:14px;--radius-sm:9px;--radius-xs:6px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
img{display:block}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:3px}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(11,11,15,0.93);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06)}
.nav-inner{max-width:1180px;margin:0 auto;padding:0 1.5rem;height:68px;display:flex;align-items:center;gap:1.5rem}
.logo{display:flex;align-items:center;gap:11px;flex-shrink:0;text-decoration:none}
.logo-mark{width:36px;height:36px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:20px;height:20px;fill:#3d2500}
.logo-text{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:800;letter-spacing:-0.5px;color:var(--text);line-height:1}
.logo-text em{color:var(--gold);font-style:normal}
.logo-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:400}
.nav-search{flex:1;max-width:400px;position:relative}
.nav-search input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:99px;color:var(--text);padding:9px 16px 9px 40px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .18s}
.nav-search input::placeholder{color:var(--muted)}
.nav-search input:focus{border-color:var(--gold-border);background:rgba(255,255,255,0.08)}
.nav-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;opacity:.4;pointer-events:none}
.nav-search-icon svg{width:16px;height:16px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-cats{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
.nav-cats::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:99px;font-size:13px;font-weight:500;border:1px solid rgba(255,255,255,0.08);color:var(--muted);background:transparent;transition:all .18s;white-space:nowrap}
.cat-btn:hover{border-color:var(--gold-border);color:var(--text)}
.cat-btn.active{background:var(--gold);color:#3d2500;border-color:var(--gold);font-weight:600}

/* HERO */
.hero{max-width:1180px;margin:0 auto;padding:5rem 1.5rem 3rem;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--gold-glow);border:1px solid var(--gold-border);border-radius:99px;padding:5px 14px;font-size:12px;color:var(--gold);font-weight:500;letter-spacing:.3px;margin-bottom:1.25rem}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hero h1{font-family:'Playfair Display',Georgia,serif;font-size:clamp(2rem,5vw,3.6rem);font-weight:800;line-height:1.1;letter-spacing:-0.04em;margin-bottom:1rem;max-width:720px;margin-left:auto;margin-right:auto}
.hero h1 em{color:var(--gold);font-style:normal}
.hero-p{font-size:1rem;color:var(--muted);line-height:1.75;max-width:520px;margin:0 auto 2.5rem;font-weight:300}
/* big search */
.hero-search{max-width:560px;margin:0 auto 2.5rem;position:relative}
.hero-search input{width:100%;background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:99px;color:var(--text);padding:16px 24px 16px 52px;font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .18s}
.hero-search input::placeholder{color:var(--muted)}
.hero-search input:focus{border-color:var(--gold-border)}
.hero-search-icon{position:absolute;left:20px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.hero-search-icon svg{width:20px;height:20px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.stores-badges{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.store-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600}
.store-badge.amz{background:var(--amz-bg);border:1px solid var(--amz-border);color:var(--amz)}
.store-badge.shp{background:var(--shp-bg);border:1px solid var(--shp-border);color:var(--shp)}
.store-badge.meli{background:var(--meli-bg);border:1px solid var(--meli-border);color:#c9b800}
.store-badge svg{width:14px;height:14px;fill:currentColor}
.hero-stats{display:flex;gap:3rem;justify-content:center;flex-wrap:wrap;margin-top:3rem;padding-top:3rem;border-top:1px solid rgba(255,255,255,0.06)}
.stat-n{font-family:'Playfair Display',Georgia,serif;font-size:2rem;font-weight:800;color:var(--gold);display:block}
.stat-l{font-size:12px;color:var(--muted);font-weight:400}

/* SECTION */
.section{max-width:1180px;margin:0 auto;padding:0 1.5rem 4rem}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.section-eyebrow{font-size:11px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
.section-title{font-family:'Playfair Display',Georgia,serif;font-size:1.5rem;font-weight:800}
.results-count{font-size:13px;color:var(--muted)}
.divider{height:1px;background:linear-gradient(90deg,rgba(240,169,58,.3),transparent);margin:0 auto 3.5rem;max-width:1180px;padding:0 1.5rem}

/* FEATURED */
.featured-wrap{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:20px;overflow:hidden;display:grid;grid-template-columns:380px 1fr;min-height:340px;transition:border-color .2s,transform .25s}
.featured-wrap:hover{border-color:var(--gold-border);transform:translateY(-2px)}
@media(max-width:860px){.featured-wrap{grid-template-columns:1fr}}
.feat-img{position:relative;overflow:hidden;background:var(--surface);display:flex;align-items:center;justify-content:center;min-height:260px}
.feat-img img{width:100%;height:100%;object-fit:cover}
.feat-badge{position:absolute;top:1rem;left:1rem;background:var(--gold);color:#3d2500;font-size:11px;font-weight:700;padding:5px 13px;border-radius:99px;letter-spacing:.5px;text-transform:uppercase}
.feat-body{padding:2rem 2.5rem;display:flex;flex-direction:column}
@media(max-width:640px){.feat-body{padding:1.5rem}}
.feat-cat{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem}
.feat-name{font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.3rem,2.2vw,1.8rem);font-weight:800;line-height:1.2;margin-bottom:.75rem}
.feat-desc{font-size:.88rem;color:var(--muted);line-height:1.65;margin-bottom:1.5rem;flex:1;font-weight:300}
.feat-prices{display:flex;flex-direction:column;gap:8px}

/* PRODUCT GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.pcard{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,transform .25s,background .2s}
.pcard:hover{border-color:var(--gold-border);transform:translateY(-4px);background:var(--card-hover)}
.pcard-img{height:185px;background:var(--surface);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.pcard:hover .pcard-img img{transform:scale(1.05)}
.pcard-img-placeholder{opacity:.1;position:absolute}
.pcard-body{padding:1.1rem 1.2rem .6rem;flex:1;display:flex;flex-direction:column;gap:.4rem}
.pcard-cat{font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold)}
.pcard-name{font-family:'Playfair Display',Georgia,serif;font-size:.98rem;font-weight:700;line-height:1.3}
.pcard-desc{font-size:.8rem;color:var(--muted);line-height:1.5;font-weight:300;margin-bottom:.4rem}
.prices-section{padding:.8rem 1.2rem 1.1rem;border-top:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;gap:7px}

/* PRICE ROW */
.price-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid transparent;text-decoration:none;transition:all .15s;position:relative}
.price-row:hover{transform:translateX(2px)}
.price-row.amz{background:var(--amz-bg);border-color:var(--amz-border)}
.price-row.shp{background:var(--shp-bg);border-color:var(--shp-border)}
.price-row.meli{background:var(--meli-bg);border-color:var(--meli-border)}
.price-row.best-price{box-shadow:0 0 0 1.5px var(--best)}
.store-logo{flex-shrink:0;font-size:11px;font-weight:700;min-width:76px}
.store-logo.amz{color:var(--amz)}
.store-logo.shp{color:var(--shp)}
.store-logo.meli{color:#c9b800}
.price-val{flex:1;font-size:15px;font-weight:700;color:var(--text)}
.best-tag{background:var(--best-bg);border:1px solid var(--best-border);color:var(--best);font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;flex-shrink:0;letter-spacing:.3px}
.price-arrow{flex-shrink:0;opacity:.4;font-size:14px}
.no-price{font-size:12px;color:var(--muted);font-style:italic;padding:6px 12px}

/* LOADING / EMPTY */
.loading-state{grid-column:1/-1;padding:5rem;text-align:center;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid rgba(240,169,58,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{grid-column:1/-1;padding:5rem 2rem;text-align:center}
.empty-icon{width:72px;height:72px;border-radius:50%;background:var(--surface);border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.empty-icon svg{width:28px;height:28px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty-title{font-family:'Playfair Display',Georgia,serif;font-size:1.2rem;font-weight:800;margin-bottom:.4rem}
.empty-sub{font-size:.875rem;color:var(--muted);font-weight:300}

/* FOOTER */
footer{border-top:1px solid rgba(255,255,255,0.06);padding:2.5rem 1.5rem;text-align:center}
.footer-inner{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:10px;align-items:center}
.footer-logo{font-family:'Playfair Display',Georgia,serif;font-size:17px;font-weight:800}
.footer-logo em{color:var(--gold);font-style:normal}
.footer-disc{font-size:12px;color:var(--muted);max-width:580px;line-height:1.6;font-weight:300}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.overlay.open{opacity:1;visibility:visible}

/* PW MODAL */
.pw-modal{background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:20px;width:100%;max-width:380px;padding:2.5rem 2rem;text-align:center;transform:scale(.96) translateY(10px);transition:transform .25s}
.overlay.open .pw-modal{transform:scale(1) translateY(0)}
.pw-icon{width:56px;height:56px;border-radius:50%;background:var(--gold-glow);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.pw-icon svg{width:24px;height:24px;fill:var(--gold)}
.pw-title{font-family:'Playfair Display',Georgia,serif;font-size:1.3rem;font-weight:800;margin-bottom:.4rem}
.pw-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem;font-weight:300}
.pw-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);color:var(--text);padding:12px 16px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;text-align:center;letter-spacing:2px;transition:border-color .18s;margin-bottom:.75rem}
.pw-input:focus{border-color:var(--gold-border)}
.pw-error{font-size:13px;color:var(--danger);margin-bottom:.75rem;display:none}
.pw-error.show{display:block}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#3d2500;border:none;border-radius:var(--radius-sm);padding:12px 28px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;transition:all .18s;cursor:pointer;justify-content:center}
.btn-primary:hover{background:#ffc04a}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .18s}
.btn-ghost:hover{border-color:rgba(255,255,255,.2);color:var(--text)}

/* ADMIN MODAL */
.admin-modal{background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:20px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;transform:scale(.96) translateY(10px);transition:transform .25s}
.overlay.open .admin-modal{transform:scale(1) translateY(0)}
.modal-head{padding:1.5rem 1.75rem 1.25rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-head h3{font-family:'Playfair Display',Georgia,serif;font-size:1.1rem;font-weight:800}
.mclose{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.mclose:hover{background:rgba(255,255,255,0.12);color:var(--text)}
.modal-body{padding:1.5rem 1.75rem;display:flex;flex-direction:column;gap:1rem}
.mfield label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.mfield input,.mfield textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:var(--radius-sm);color:var(--text);padding:11px 15px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .18s;resize:vertical}
.mfield input::placeholder,.mfield textarea::placeholder{color:var(--muted)}
.mfield input:focus,.mfield textarea:focus{border-color:var(--gold-border)}
.mfield textarea{min-height:72px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.store-section{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm);padding:1rem}
.store-section-title{font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:.75rem;display:flex;align-items:center;gap:7px}
.store-section-title.amz{color:var(--amz)}
.store-section-title.shp{color:var(--shp)}
.store-section-title.meli{color:#c9b800}
.feat-toggle{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;transition:border-color .18s}
.feat-toggle:hover{border-color:var(--gold-border)}
.feat-toggle input{accent-color:var(--gold);width:15px;height:15px;cursor:pointer}
.feat-toggle span{font-weight:500;color:var(--text)}
.feat-toggle small{font-weight:300}
.modal-foot{padding:1.25rem 1.75rem;border-top:1px solid rgba(255,255,255,0.07);display:flex;gap:8px;align-items:center}
.btn-del{background:none;border:1px solid rgba(224,85,85,.25);color:var(--danger);border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .18s;margin-right:auto}
.btn-del:hover{background:rgba(224,85,85,.1)}
.btn-save{background:var(--gold);color:#3d2500;border:none;border-radius:var(--radius-sm);padding:10px 24px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;transition:all .18s;flex:1}
.btn-save:hover{background:#ffc04a}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.admin-tabs{display:flex;gap:6px;margin-bottom:1rem}
.atab{flex:1;padding:9px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:1px solid rgba(255,255,255,0.08);color:var(--muted);background:transparent;font-family:'DM Sans',sans-serif;transition:all .15s}
.atab.active{background:var(--gold);color:#3d2500;border-color:var(--gold);font-weight:700}
.tab-panel{display:none}
.tab-panel.active{display:block}
.prod-list{display:flex;flex-direction:column;gap:8px}
.prod-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm);padding:10px 14px;cursor:pointer;transition:border-color .15s}
.prod-item:hover{border-color:var(--gold-border)}
.prod-item-img{width:36px;height:36px;border-radius:6px;background:var(--card);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.prod-item-img img{width:100%;height:100%;object-fit:cover}
.prod-item-info{flex:1;min-width:0}
.prod-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-item-cat{font-size:11px;color:var(--gold);margin-top:1px}
.btn-icon{background:rgba(255,255,255,0.06);border:none;color:var(--muted);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-icon:hover{background:rgba(255,255,255,0.12);color:var(--text)}
.btn-icon svg{width:15px;height:15px;fill:currentColor}
.saving-indicator{display:none;align-items:center;gap:6px;font-size:12px;color:var(--gold);padding:4px 10px;border-radius:99px;background:var(--gold-glow);border:1px solid var(--gold-border)}
.saving-indicator.show{display:flex}
.saving-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1s ease-in-out infinite}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--gold-border);border-radius:var(--radius-sm);padding:12px 20px;font-size:13px;color:var(--text);z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:280px;font-weight:500}
.toast.show{opacity:1;transform:translateY(0)}

/* SEARCH HIGHLIGHT */
mark{background:rgba(240,169,58,0.25);color:var(--gold);border-radius:2px;padding:0 2px}

/* AUTO-UPDATE BADGE */
.auto-badge{display:inline-block;background:var(--best-bg);border:1px solid var(--best-border);color:var(--best);font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;margin-left:6px;letter-spacing:.3px}

@media(max-width:640px){
  .nav-cats{display:none}
  .row2{grid-template-columns:1fr}
  .admin-modal,.pw-modal{max-width:100%;border-radius:16px 16px 0 0;margin-top:auto;max-height:95vh}
  .overlay{align-items:flex-end}
  .hero{padding:3rem 1.5rem 2rem}
  .hero-stats{gap:2rem}
}
@keyframes fadeinup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.hero{animation:fadeinup .5s ease both}
</style>
</head>
<body>
